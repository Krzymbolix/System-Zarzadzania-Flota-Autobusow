<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Strona główna</title>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css} "/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link th:rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="imageBackground">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
    <div class="container">
        <a class="navbar-brand" href="/">Spring Boot projekt - część II</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bstarget="#navbarResponsive"
                aria-controls="navbarResponsive"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search_by_line}">Wyszukaj po numerze linii</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search_by_stop}">Wyszukaj po przystanku</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Zaloguj</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div>
    <h3 class="mb-3">Wyszukaj przystanek</h3>

    <!-- SEARCH BAR -->
    <div style="position: relative;">
        <input type="text" id="stopInput" placeholder="Wpisz nazwę przystanku">
        <ul id="suggestions" class="list-group position-absolute w-100"></ul>
    </div>
</div>

<div class="container" style="margin-top:35px">
    <label style="font-size:25px"><b>Przystanki</b></label>
    <table class="table transparent-table">
        <thead>
        <tr>
            <th>Nazwa</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="przystanek : ${listPrzystanki}">
            <td th:text="${przystanek.nazwa + ' ' + przystanek.nr_porzadkowy}">Nazwa</td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    const input = document.getElementById('stopInput');
    const suggestions = document.getElementById('suggestions');

    let selectedIndex = -1;
    let currentSuggestions = [];

    function goToStop(stop) {
        window.location.href = `/found_stop?id=${stop.id}`;
    }

    input.addEventListener('input', async () => {
        const query = input.value.trim();
        if (!query) {
            suggestions.innerHTML = '';
            currentSuggestions = [];
            return;
        }

        // pobieranie sugestii z backendu
        try {
            const res = await fetch(`/api/stops?q=${encodeURIComponent(query)}`);
            if (!res.ok) return;

            const data = await res.json();
            currentSuggestions = data;
            selectedIndex = -1;

            suggestions.innerHTML = data.map(stop =>
                `<li class="list-group-item list-group-item-action" data-id="${stop.id}">${stop.name}</li>`
            ).join('');
        } catch (err) {
            console.error(err);
        }
    });

    input.addEventListener('keydown', (e) => {
        const items = suggestions.querySelectorAll('li');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            selectedIndex = (selectedIndex + 1) % items.length;
            updateActive(items);
            e.preventDefault();
        } else if (e.key === 'ArrowUp') {
            selectedIndex = (selectedIndex - 1 + items.length) % items.length;
            updateActive(items);
            e.preventDefault();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (selectedIndex >= 0) {
                goToStop(currentSuggestions[selectedIndex]);
            }
        }
    });

    function updateActive(items) {
        items.forEach((item, i) => {
            item.classList.toggle('active', i === selectedIndex);
        });
    }

    // kliknięcie myszką
    suggestions.addEventListener('click', (e) => {
        if (e.target.tagName === 'LI') {
            const id = e.target.dataset.id;
            const stop = currentSuggestions.find(s => s.id === id);
            goToStop(stop);
        }
    });


</script>

</body>
</html>
