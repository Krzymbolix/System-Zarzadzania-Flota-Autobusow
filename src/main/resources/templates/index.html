<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Strona główna</title>
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.7/css/bootstrap.min.css} "/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
    <link th:rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="imageBackground">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark static-top">
    <div class="container">
        <a class="navbar-brand" href="/">Spring Boot projekt - część II</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bstarget="#navbarResponsive"
                aria-controls="navbarResponsive"
                aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarResponsive">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search_by_line}">Wyszukaj po numerze linii</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/search_by_stop}">Wyszukaj po przystanku</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/login}">Zaloguj</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <div class="row">
        <div class="col-md-10 mt-5">
            <label style="font-size:30px">Witaj na stronie głównej!</label>
            <div style="font-size:20px">Jeśli chcesz się zalogować, kliknij <a th:href="@{/login}"><b>tutaj</b></a> lub
                w prawym górnym rogu.
            </div>
        </div>
    </div>
</div>

<!-- Table -->
<div style="margin-top:35px">
    <label style="font-size:25px"><b>Dostępne produkty</b></label>
    <table class="table" >
        <thead>
        <tr>
            <th>Nr (nr_bazy)</th>
            <th>Ulica (nazwa_ulicy)</th>
            <th>Nr domu (nr_porzadkowy_ulicy)</th>
            <th>Kod pocztowy (kod_pocztowy)</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="bazy : ${listBazy}">
            <td th:text="${bazy.nr_bazy}">nr_bazy</td>
            <td th:text="${bazy.nazwa_ulicy}">nazwa_ulicy</td>
            <td th:text="${bazy.nr_porzadkowy_ulicy}">nr_domu</td>
            <td th:text="${bazy.kod_pocztowy}">kod_pocztowy</td>
        </tr>
        </tbody>
    </table>
</div>

<script th:src="@{/webjars/jquery/jquery.min.js}"></script>
<script th:src="@{/webjars/popper.js/umd/popper.min.js}"></script>
<script th:src="@{/webjars/bootstrap/js/bootstrap.min.js}"></script>
</body>
</html>
